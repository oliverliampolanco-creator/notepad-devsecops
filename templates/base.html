<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SecureNotes{% endblock %}</title>

  <!-- [QA FIX] Cache-Control meta tags: prevent browser from caching authenticated pages.
       Combined with the Cache-Control HTTP headers set in app.py, this stops the
       browser back-button vulnerability after logout. -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Animations ── */
    .fade-in {
      animation: fadeIn 0.25s ease-out both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-up {
      animation: slideUp 0.2s ease-out both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Note card hover transition ── */
    .note-card {
      transition: all 0.15s ease;
    }
    .note-card:hover {
      transform: translateX(2px);
    }

    /* ── Scrollbar ── */
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #4B5563; }

    /* ── Textarea font ── */
    #edContent {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
      tab-size: 2;
    }

    /* ── Smooth page load ── */
    body {
      opacity: 0;
      animation: pageLoad 0.2s ease-out 0.05s forwards;
    }
    @keyframes pageLoad {
      to { opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
